name: CI/CD - Test, Build, Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  DOCKERHUB_REPOSITORY: churn-api
  IMAGE_NAME: churn-api

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --group dev
          
      - name: Run tests
        run: uv run pytest tests/ -v --cov=app --cov=main --cov-report=term-missing

  build_and_push:
    name: Build and Push Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build, tag, and push image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          IMAGE_URI=${DOCKERHUB_USERNAME}/${DOCKERHUB_REPOSITORY}:${GITHUB_SHA}
          IMAGE_LATEST=${DOCKERHUB_USERNAME}/${DOCKERHUB_REPOSITORY}:latest
          docker build --no-cache -t ${IMAGE_URI} -t ${IMAGE_LATEST} .
          docker push ${IMAGE_URI}
          docker push ${IMAGE_LATEST}

  deploy:
    name: Deploy to EC2
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_REPOSITORY: ${{ env.DOCKERHUB_REPOSITORY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_REPOSITORY,IMAGE_NAME,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            IMAGE_URI=${DOCKERHUB_USERNAME}/${DOCKERHUB_REPOSITORY}:latest
            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            docker pull ${IMAGE_URI}
            docker stop ${IMAGE_NAME} || true
            docker rm ${IMAGE_NAME} || true
            docker run -d --restart unless-stopped --name ${IMAGE_NAME} -p 443:8000 ${IMAGE_URI}
            
